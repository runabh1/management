services:
  - type: web
    name: smartcampus
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm run build && cd backend && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: GEMINI_API_KEY
        sync: false                # You set this manually in Render dashboard
      - key: PORT
        value: 10000               # Render assigns port 10000 by default
